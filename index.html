<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trending — Google Trends Recap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="container">
    <h1>Trending<span class="accent">.</span></h1>
    <p class="subtitle">Google Trends — real-time recap</p>

    <div id="authArea">
      <button id="connectBtn">🌸 Connect Pollinations</button>
      <span id="connectedBadge" hidden>🌸 Connected <button id="disconnectBtn">×</button></span>
    </div>

    <div class="controls">
      <div class="country-wrap">
        <span class="detected-badge" id="detectedBadge" hidden>📍 Auto-detected</span>
        <select id="countrySelect">
          <option value="US">🇺🇸 United States</option>
          <option value="TW">🇹🇼 Taiwan</option>
          <option value="GB">🇬🇧 United Kingdom</option>
          <option value="AU">🇦🇺 Australia</option>
          <option value="CA">🇨🇦 Canada</option>
          <option value="DE">🇩🇪 Germany</option>
          <option value="FR">🇫🇷 France</option>
          <option value="JP">🇯🇵 Japan</option>
          <option value="KR">🇰🇷 South Korea</option>
          <option value="BR">🇧🇷 Brazil</option>
          <option value="IN">🇮🇳 India</option>
          <option value="MX">🇲🇽 Mexico</option>
          <option value="IT">🇮🇹 Italy</option>
          <option value="ES">🇪🇸 Spain</option>
          <option value="NL">🇳🇱 Netherlands</option>
          <option value="PL">🇵🇱 Poland</option>
          <option value="AR">🇦🇷 Argentina</option>
          <option value="ZA">🇿🇦 South Africa</option>
          <option value="NG">🇳🇬 Nigeria</option>
          <option value="SG">🇸🇬 Singapore</option>
        </select>
      </div>
      <select id="langSelect">
        <option value="en">🌐 English</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="zh">🇹🇼 中文</option>
      </select>
      <button id="refreshBtn">↻ Refresh</button>
    </div>

    <div class="meta" id="meta" hidden>
      Updated <span id="updatedAt"></span>
    </div>

    <div class="loader" id="loader" hidden>
      <div class="spinner"></div>
      <span>Fetching trends…</span>
    </div>

    <div class="error" id="error" hidden></div>

    <div class="trends-grid" id="trendsGrid"></div>
  </div>

  <!-- Explore modal -->
  <div id="modal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <div class="modal-trend-info">
          <div class="modal-trend-name" id="modalTrendName"></div>
          <div class="modal-traffic" id="modalTraffic"></div>
        </div>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body">

        <!-- Step 2: Web Research -->
        <div class="modal-step-section">
          <div class="step-header">
            <span class="step-badge">2</span>
            <span class="step-title">Web Research</span>
          </div>
          <button class="step-action-btn" id="step2Btn">🔍 Search the Web</button>
          <div class="step-loader" id="step2Loader" hidden>
            <div class="spinner"></div><span>Searching the web…</span>
          </div>
          <div class="step-result" id="step2Result" hidden></div>
        </div>

        <!-- Step 3: Write Article -->
        <div class="modal-step-section" id="step3Section" hidden>
          <div class="step-header">
            <span class="step-badge">3</span>
            <span class="step-title">Write Article</span>
          </div>
          <button class="step-action-btn article-btn" id="step3Btn">✍️ Write Article</button>
          <div class="step-loader" id="step3Loader" hidden>
            <div class="spinner"></div><span>Writing article…</span>
          </div>
          <div class="step-result article-result" id="step3Result" hidden></div>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
